name: Upstream Monitor

on:
  schedule:
    - cron: '0 8 * * 1'
  workflow_dispatch:

permissions:
  issues: write

jobs:
  check-upstreams:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check upstream chain
        run: |
          echo "## Upstream Update Report" > report.md
          echo "" >> report.md
          echo "Checked: $(date -u '+%Y-%m-%d %H:%M UTC')" >> report.md
          echo "" >> report.md
          check_repo() {
            echo "### $1" >> report.md
            echo "- Repo: $2" >> report.md
            curl -s "https://api.github.com/repos/$2/commits?per_page=3" | jq -r '.[] | "- " + .commit.message[0..80] + " (" + .sha[0..7] + ")"' >> report.md 2>/dev/null || echo "- Unable to fetch" >> report.md
            echo "" >> report.md
          }
          check_repo "Anthropic Original" "anthropics/claude-for-legal"
          check_repo "Chinese Fork" "zhou210712/claude-for-legal-ZH"
          check_repo "Our Upstream" "SH88-source/claude-for-legal-CN"
          check_repo "Codex Wrapper" "gjhcsjamin/codex-for-legal-CN"
          cat report.md

      - name: Create or update issue
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('report.md', 'utf8');
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: ['upstream-update']
            });
            if (issues.length > 0) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issues[0].number,
                body: report
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: 'Upstream Update - ' + new Date().toISOString().slice(0, 10),
                body: report,
                labels: ['upstream-update']
              });
            }
